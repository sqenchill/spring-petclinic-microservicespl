# SPCAD-15 — Setup Base CI Pipeline
# SPCAD-16 — Push Images via Pipeline
# SPCAD-17 — Deploy to EKS via Pipeline
#
# Required GitHub Secrets (set in repo Settings > Secrets and variables > Actions):
#   AWS_ACCESS_KEY_ID       — IAM user access key
#   AWS_SECRET_ACCESS_KEY   — IAM user secret key
#   AWS_REGION              — e.g. us-east-1
#   AWS_ACCOUNT_ID          — 12-digit AWS account ID
#   CLUSTER_NAME            — EKS cluster name
#   NAMESPACE               — Kubernetes namespace

name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_PREFIX: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test all services
        run: ./mvnw clean install

  build-and-push:
    name: Build & Push Images to ECR
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Authenticate Docker to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION | \
          docker login --username AWS --password-stdin $ECR_PREFIX

      - name: Build and push all service images
        run: |
          ./mvnw clean install -DskipTests -P buildDocker \
            -Ddocker.image.prefix=$ECR_PREFIX \
            -Dcontainer.build.extraarg="--push" \
            -Ddocker.image.tag=$IMAGE_TAG

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.CLUSTER_NAME }} \
            --region $AWS_REGION

      - name: Substitute image tags in manifests
        run: |
          sed -i "s|<IMAGE_TAG>|$IMAGE_TAG|g" k8s/*.yaml
          sed -i "s|<AWS_ACCOUNT_ID>|$AWS_ACCOUNT_ID|g" k8s/*.yaml
          sed -i "s|<AWS_REGION>|$AWS_REGION|g" k8s/*.yaml
          sed -i "s|<NAMESPACE>|${{ secrets.NAMESPACE }}|g" k8s/*.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/config-server.yaml
          kubectl apply -f k8s/discovery-server.yaml
          kubectl apply -f k8s/api-gateway.yaml
          kubectl apply -f k8s/customers-service.yaml
          kubectl apply -f k8s/vets-service.yaml
          kubectl apply -f k8s/visits-service.yaml
          kubectl apply -f k8s/genai-service.yaml

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/config-server -n ${{ secrets.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/discovery-server -n ${{ secrets.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/api-gateway -n ${{ secrets.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/customers-service -n ${{ secrets.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/vets-service -n ${{ secrets.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/visits-service -n ${{ secrets.NAMESPACE }} --timeout=120s
          kubectl rollout status deployment/genai-service -n ${{ secrets.NAMESPACE }} --timeout=120s
