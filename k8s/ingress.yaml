# Ingress — routes external traffic to the API Gateway
# SPCAD-24 / SPCAD-25 | Install Ingress Controller & Configure Routing Rules
# Requires the ingress controller to be installed first:
#   helm install ingress-nginx ingress-nginx/ingress-nginx --namespace ingress-nginx --create-namespace
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: petclinic-ingress
  namespace: spring-petclinic-ireland
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: <YOUR_DOMAIN_OR_LB_DNS>
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
