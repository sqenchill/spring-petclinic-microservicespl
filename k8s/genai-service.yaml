# GenAI Service — Spring AI chatbot, requires OpenAI API key as a Kubernetes Secret
# Create the secret before applying this manifest:
#   kubectl create secret generic openai-secret --from-literal=OPENAI_API_KEY=<your-key> -n spring-petclinic-ireland
# SPCAD-23 | Deploy Services 7–8
apiVersion: apps/v1
kind: Deployment
metadata:
  name: genai-service
  namespace: spring-petclinic-ireland
  labels:
    app: genai-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: genai-service
  template:
    metadata:
      labels:
        app: genai-service
    spec:
      initContainers:
        - name: wait-for-discovery-server
          image: busybox
          command: ['sh', '-c', 'until wget -qO- http://discovery-server:8761/actuator/health; do echo waiting for discovery-server; sleep 5; done']
      containers:
        - name: genai-service
          image: 135728714831.dkr.ecr.eu-west-1.amazonaws.com/spring-petclinic-genai-service:latest
          ports:
            - containerPort: 8084
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: CONFIG_SERVER_URL
              value: "http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka/"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-secret
                  key: OPENAI_API_KEY
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8084
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: genai-service
  namespace: spring-petclinic-ireland
spec:
  selector:
    app: genai-service
  ports:
    - protocol: TCP
      port: 8084
      targetPort: 8084
  type: ClusterIP
