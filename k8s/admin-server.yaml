# Admin Server — Spring Boot Admin UI for service health and metrics monitoring
# SPCAD-23 | Deploy Services 7–8 | Sonny Enchill
# Must be created AFTER config-server and discovery-server are healthy.
# Create before applying:
#   No additional secrets required.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-server
  namespace: spring-petclinic-ireland
  labels:
    app: admin-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-server
  template:
    metadata:
      labels:
        app: admin-server
    spec:
      initContainers:
        - name: wait-for-config-server
          image: busybox
          command: ['sh', '-c', 'until wget -qO- http://config-server:8888/actuator/health; do echo waiting for config-server; sleep 5; done']
        - name: wait-for-discovery-server
          image: busybox
          command: ['sh', '-c', 'until wget -qO- http://discovery-server:8761/actuator/health; do echo waiting for discovery-server; sleep 5; done']
      containers:
        - name: admin-server
          image: 135728714831.dkr.ecr.eu-west-1.amazonaws.com/spring-petclinic-admin-server:latest
          ports:
            - containerPort: 9090
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "docker"
            - name: CONFIG_SERVER_URL
              value: "http://config-server:8888"
            - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
              value: "http://discovery-server:8761/eureka/"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 9090
            initialDelaySeconds: 90
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: admin-server
  namespace: spring-petclinic-ireland
spec:
  selector:
    app: admin-server
  ports:
    - protocol: TCP
      port: 9090
      targetPort: 9090
  type: ClusterIP
